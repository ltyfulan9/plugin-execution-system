services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pes
      POSTGRES_PASSWORD: pes_dev_password
      POSTGRES_DB: pes
    ports:
      - "5432:5432"
    volumes:
      - pes-postgres:/var/lib/postgresql/data
      - ../../migrations/postgres:/docker-entrypoint-initdb.d:ro
  pes:
    build: ../..
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SERVER_ADDR: ":8080"
      METADATA_STORE: "postgres"
      POSTGRES_DSN: "postgres://pes:pes_dev_password@postgres:5432/pes?sslmode=disable"
      PLUGIN_DIR: "/app/plugins"
      AUTH_MODE: "local-token"
      DEMO_TOKEN: "demo-token"
      ADMIN_TOKEN: "admin-token"
      PLUGIN_CONTAINER_RUNTIME_ENABLED: "true"
volumes:
  pes-postgres:
