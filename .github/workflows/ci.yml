name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Format check
        run: |
          test -z "$(gofmt -l $(find . -name '*.go'))"
      - name: Unit and integration tests
        run: go test ./...
      - name: Race tests
        run: go test -race ./...
