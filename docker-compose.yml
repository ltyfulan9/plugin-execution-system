# Local development compose. Production topology should use deploy/postgres/docker-compose.enterprise.yml
# and a real Postgres-backed metadata adapter.
services:
  pes:
    build: .
    ports:
      - "8080:8080"
    environment:
      SERVER_ADDR: ":8080"
      METADATA_STORE: "local-json"
      ALLOW_LOCAL_JSON_STORE: "true"
      STORAGE_DIR: "/data"
      PLUGIN_DIR: "/app/plugins"
      DEMO_TOKEN: "demo-token"
      ADMIN_TOKEN: "admin-token"
      PLUGIN_ALLOWED_COMMANDS: "python3,python,node"
    volumes:
      - pes-data:/data
volumes:
  pes-data:
